<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background Circle (Clock Face) -->
  <circle cx="50" cy="50" r="48" fill="#f4f1de" stroke="#3d405b" stroke-width="0.5" />
  
  <!-- Minute Marks -->
  <g stroke="#3d405b" stroke-width="0.3" opacity="0.4">
    <line x1="50" y1="2" x2="50" y2="5" />
    <line x1="50" y1="95" x2="50" y2="98" />
    <line x1="2" y1="50" x2="5" y2="50" />
    <line x1="95" y1="50" x2="98" y2="50" />
  </g>

  <!-- Peach Segment (Light Orange) -->
  <path d="M 50,50 L 50,5 A 45,45 0 0 1 95,50 Z" fill="#e8e5d8" />
  
  <!-- Coral Segment (Darker Orange/Red) -->
  <path d="M 50,50 L 95,50 A 45,45 0 0 1 50,95 Z" fill="#e07a5f" />
  
  <!-- Blue Hand -->
  <path d="M 50,50 L 93,48 L 93,52 Z" fill="#3d405b" />
  
  <!-- Center Text Background (Small Circle) -->
  <circle cx="50" cy="50" r="12" fill="#f4f1de" />
</svg>
